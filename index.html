<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海豚影楼 - 客户样片系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#3B82F6', accent: '#F59E0B' } } }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
      .hover-scale { transition: transform 0.3s ease; }
      .hover-scale:hover { transform: scale(1.02); }
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen">

<!-- 登录弹窗 -->
<div id="login-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90">
  <div class="bg-white dark:bg-gray-800 w-full max-w-sm p-6 rounded-lg mx-4">
    <h2 class="text-xl font-bold mb-4 text-center">系统登录</h2>
    <input id="login-user" placeholder="账号" class="w-full p-2 mb-2 border rounded dark:bg-gray-700">
    <input id="login-pwd" type="password" placeholder="密码" class="w-full p-2 mb-3 border rounded dark:bg-gray-700">
    <button onclick="doLogin()" class="w-full bg-primary text-white p-2 rounded">登录</button>
    <button onclick="showRegister()" class="w-full mt-2 text-sm text-gray-500">注册账号</button>
  </div>
</div>

<!-- 注册弹窗 -->
<div id="register-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/90">
  <div class="bg-white dark:bg-gray-800 w-full max-w-sm p-6 rounded-lg mx-4">
    <h2 class="text-xl font-bold mb-4 text-center">注册账号</h2>
    <input id="reg-user" placeholder="用户名" class="w-full p-2 mb-2 border rounded dark:bg-gray-700">
    <input id="reg-pwd" type="password" placeholder="密码" class="w-full p-2 mb-2 border rounded dark:bg-gray-700">
    <input id="reg-phone" placeholder="手机号" class="w-full p-2 mb-3 border rounded dark:bg-gray-700">
    <button onclick="doRegister()" class="w-full bg-primary text-white p-2 rounded">提交注册</button>
    <button onclick="hideRegister()" class="w-full mt-2 text-sm text-gray-500">返回登录</button>
  </div>
</div>

<!-- 主界面 -->
<div id="main-app" class="hidden">
  <header class="fixed top-0 left-0 right-0 bg-white dark:bg-gray-800 shadow z-40">
    <div class="px-4 py-3 flex justify-between items-center">
      <div class="font-bold text-lg">海豚影楼样片系统</div>
      <div class="flex gap-2">
        <span id="user-name" class="text-sm"></span>
        <button onclick="logout()" class="text-xs px-2 py-1 bg-red-500 text-white rounded">退出</button>
      </div>
    </div>
  </header>

  <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t z-50">
    <div class="flex justify-around py-2">
      <button onclick="goPage('gallery')" class="nav-btn flex flex-col items-center text-primary" data-page="gallery">
        <i class="fa fa-th-large text-lg"></i><span class="text-xs">相册</span>
      </button>
      <button onclick="goPage('reserve')" class="nav-btn flex flex-col items-center text-gray-500" data-page="reserve">
        <i class="fa fa-calendar text-lg"></i><span class="text-xs">预约</span>
      </button>
      <button onclick="goPage('admin')" class="nav-btn flex flex-col items-center text-gray-500" data-page="admin">
        <i class="fa fa-cog text-lg"></i><span class="text-xs">管理</span>
      </button>
    </div>
  </nav>

  <main class="pt-16 pb-20 px-3 max-w-4xl mx-auto">
    <!-- 相册 -->
    <section id="page-gallery" class="page-block">
      <h2 class="text-xl font-bold mb-3">样片相册</h2>
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-3">
        <button onclick="filterCat('all')" class="cat-btn py-1 px-2 rounded bg-primary text-white text-sm">全部</button>
        <button onclick="filterCat('children')" class="cat-btn py-1 px-2 rounded bg-gray-200 text-sm">儿童</button>
        <button onclick="filterCat('wedding')" class="cat-btn py-1 px-2 rounded bg-gray-200 text-sm">婚纱</button>
        <button onclick="filterCat('portrait')" class="cat-btn py-1 px-2 rounded bg-gray-200 text-sm">写真</button>
        <button onclick="filterCat('birthday')" class="cat-btn py-1 px-2 rounded bg-gray-200 text-sm">生日</button>
        <button onclick="filterCat('graduation')" class="cat-btn py-1 px-2 rounded bg-gray-200 text-sm">毕业</button>
      </div>
      <div id="photo-list" class="photo-grid grid gap-3"></div>
    </section>

    <!-- 预约 -->
    <section id="page-reserve" class="page-block hidden">
      <h2 class="text-xl font-bold mb-3">预约/预留信息</h2>
      <div class="bg-white dark:bg-gray-800 p-3 rounded shadow mb-4">
        <input id="rv-name" placeholder="姓名" class="w-full p-2 mb-2 border rounded">
        <input id="rv-phone" placeholder="电话" class="w-full p-2 mb-2 border rounded">
        <input id="rv-date" placeholder="预约日期" class="w-full p-2 mb-2 border rounded">
        <textarea id="rv-note" placeholder="备注" class="w-full p-2 mb-2 border rounded"></textarea>
        <button onclick="submitReserve()" class="w-full bg-primary text-white p-2 rounded">提交预约</button>
      </div>
      <div id="my-reserve" class="bg-white dark:bg-gray-800 p-3 rounded shadow"></div>
    </section>

    <!-- 管理后台 -->
    <section id="page-admin" class="page-block hidden">
      <h2 class="text-xl font-bold mb-3">管理后台</h2>
      <div class="space-y-3">
        <div class="bg-white dark:bg-gray-800 p-3 rounded shadow">
          <h3 class="font-semibold mb-2">上传样片（仅管理员）</h3>
          <input id="up-title" placeholder="标题" class="w-full p-2 mb-2 border rounded">
          <select id="up-cate" class="w-full p-2 mb-2 border rounded">
            <option value="children">儿童摄影</option>
            <option value="wedding">婚纱</option>
            <option value="portrait">写真</option>
            <option value="birthday">生日</option>
            <option value="graduation">毕业</option>
          </select>
          <input type="file" id="up-file" accept="image/*" class="w-full mb-2">
          <button onclick="adminUpload()" class="w-full bg-primary text-white p-2 rounded">上传</button>
        </div>

        <div class="bg-white dark:bg-gray-800 p-3 rounded shadow">
          <h3 class="font-semibold mb-2">用户审核</h3>
          <div id="user-check-list" class="space-y-2"></div>
        </div>

        <div class="bg-white dark:bg-gray-800 p-3 rounded shadow">
          <h3 class="font-semibold mb-2">预约信息管理</h3>
          <div id="rv-list" class="space-y-2"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
// 存储KEY
const ST = {
  users: 'sys_users',
  photos: 'sys_photos',
  reserves: 'sys_reserves',
  login: 'sys_login'
}

// 初始化超级管理员
function initAdmin() {
  let users = JSON.parse(localStorage.getItem(ST.users) || '[]')
  if (users.length === 0) {
    users.push({ user: 'admin', pwd: 'admin888', phone: '10086', status: 'passed', role: 'admin' })
    localStorage.setItem(ST.users, JSON.stringify(users))
  }
}

// 登录/注册
function doLogin() {
  let u = document.getElementById('login-user').value
  let p = document.getElementById('login-pwd').value
  let users = JSON.parse(localStorage.getItem(ST.users))
  let user = users.find(x => x.user === u && x.pwd === p)
  if (!user) return alert('账号或密码错误')
  if (user.status !== 'passed') return alert('账号待审核')
  localStorage.setItem(ST.login, JSON.stringify(user))
  location.reload()
}
function showRegister() { document.getElementById('login-modal').classList.add('hidden'); document.getElementById('register-modal').classList.remove('hidden') }
function hideRegister() { document.getElementById('register-modal').classList.add('hidden'); document.getElementById('login-modal').classList.remove('hidden') }
function doRegister() {
  let u = document.getElementById('reg-user').value
  let p = document.getElementById('reg-pwd').value
  let phone = document.getElementById('reg-phone').value
  if (!u || !p || !phone) return alert('请填写完整')
  let users = JSON.parse(localStorage.getItem(ST.users))
  if (users.find(x => x.user === u)) return alert('账号已存在')
  users.push({ user: u, pwd: p, phone: phone, status: 'pending', role: 'user' })
  localStorage.setItem(ST.users, JSON.stringify(users))
  alert('注册成功，请等待管理员审核')
  hideRegister()
}
function logout() { localStorage.removeItem(ST.login); location.reload() }

// 页面切换
let currentPage = 'gallery'
function goPage(p) {
  currentPage = p
  document.querySelectorAll('.page-block').forEach(x => x.classList.add('hidden'))
  document.getElementById('page-' + p).classList.remove('hidden')
  document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('text-primary'))
  document.querySelectorAll('.nav-btn').forEach(x => x.classList.add('text-gray-500'))
  document.querySelector(`[data-page="${p}"]`).classList.remove('text-gray-500')
  document.querySelector(`[data-page="${p}"]`).classList.add('text-primary')
}

// 相册
let currentCat = 'all'
function loadPhotos() {
  let list = JSON.parse(localStorage.getItem(ST.photos) || '[]')
  if (currentCat !== 'all') list = list.filter(x => x.cate === currentCat)
  let dom = document.getElementById('photo-list')
  dom.innerHTML = ''
  list.forEach(p => {
    let item = document.createElement('div')
    item.className = 'bg-white dark:bg-gray-800 rounded shadow overflow-hidden hover-scale'
    item.innerHTML = `<img src="${p.url}" class="w-full h-40 object-cover"><div class="p-2 text-sm">${p.title}</div>`
    dom.appendChild(item)
  })
}
function filterCat(c) { currentCat = c; loadPhotos() }

// 预约
function submitReserve() {
  let user = JSON.parse(localStorage.getItem(ST.login))
  let name = document.getElementById('rv-name').value
  let phone = document.getElementById('rv-phone').value
  let date = document.getElementById('rv-date').value
  let note = document.getElementById('rv-note').value
  if (!name || !phone) return alert('请填写姓名和电话')
  let reserves = JSON.parse(localStorage.getItem(ST.reserves) || '[]')
  reserves.push({ user: user.user, name: name, phone: phone, date: date, note: note, createTime: new Date().toLocaleString() })
  localStorage.setItem(ST.reserves, JSON.stringify(reserves))
  alert('提交成功')
  loadMyReserve()
}
function loadMyReserve() {
  let user = JSON.parse(localStorage.getItem(ST.login))
  let reserves = JSON.parse(localStorage.getItem(ST.reserves) || '[]')
  let my = reserves.filter(x => x.user === user.user)
  let dom = document.getElementById('my-reserve')
  dom.innerHTML = my.length ? my.map(x => `
  <div class="border-b pb-2 mb-2">
    <div>姓名：${x.name}</div>
    <div>电话：${x.phone}</div>
    <div>时间：${x.date || '未填写'}</div>
    <div>备注：${x.note || '无'}</div>
    <div class="text-xs text-gray-500">${x.createTime}</div>
  </div>`).join('') : '<div>暂无预约</div>'
}

// 管理员上传
function adminUpload() {
  let user = JSON.parse(localStorage.getItem(ST.login))
  if (user.role !== 'admin') return alert('无权限')
  let title = document.getElementById('up-title').value
  let cate = document.getElementById('up-cate').value
  let file = document.getElementById('up-file').files[0]
  if (!title || !file) return alert('请填写标题并选择图片')
  let reader = new FileReader()
  reader.onload = e => {
    let photos = JSON.parse(localStorage.getItem(ST.photos) || '[]')
    photos.unshift({ title, cate, url: e.target.result, time: new Date().toLocaleString() })
    localStorage.setItem(ST.photos, JSON.stringify(photos))
    alert('上传成功')
    loadPhotos()
  }
  reader.readAsDataURL(file)
}

// 加载用户审核
function loadCheckUsers() {
  let users = JSON.parse(localStorage.getItem(ST.users))
  let list = users.filter(x => x.status === 'pending')
  let dom = document.getElementById('user-check-list')
  dominnerHTML = list.length ? list.map(u => `
  <div class="flex justify-between items-center border-b pb-2">
    <div>${u.user} (${u.phone})</div>
    <button onclick="passUser('${u.user}')" class="text-xs bg-green-500 text-white px-2 py-1 rounded">通过</button>
  </div>`).join('') : '<div>暂无待审核用户</div>'
}
function passUser(username) {
  let users = JSON.parse(localStorage.getItem(ST.users))
  let user = users.find(x => x.user === username)
  if (user) user.status = 'passed'
  localStorage.setItem(ST.users, JSON.stringify(users))
  loadCheckUsers()
}

// 加载预约管理
function loadAdminReserve() {
  let list = JSON.parse(localStorage.getItem(ST.reserves) || '[]')
  let dom = document.getElementById('rv-list')
  dom.innerHTML = list.length ? list.map(x => `
  <div class="border-b pb-2 mb-2">
    <div>客户：${x.name} / ${x.phone}</div>
    <div>预约：${x.date || '未填写'}</div>
    <div>备注：${x.note || '无'}</div>
    <div class="text-xs text-gray-500">提交：${x.createTime}</div>
    <button onclick="contactCustomer('${x.phone}')" class="mt-1 text-xs bg-primary text-white px-2 py-1 rounded">联系客户</button>
  </div>`).join('') : '<div>暂无预约</div>'
}
function contactCustomer(phone) { alert('联系客户电话：' + phone + '（可直接复制拨号）') }

// 初始化
window.onload = () => {
  initAdmin()
  let login = JSON.parse(localStorage.getItem(ST.login) || 'null')
  if (!login) {
    document.getElementById('login-modal').classList.remove('hidden')
    return
  }
  document.getElementById('login-modal').classList.add('hidden')
  document.getElementById('main-app').classList.remove('hidden')
  document.getElementById('user-name').innerText = login.user
  loadPhotos()
  loadMyReserve()
  if (login.role === 'admin') {
    loadCheckUsers()
    loadAdminReserve()
  }
}
</script>
</body>
</html>
