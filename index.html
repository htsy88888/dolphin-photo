<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海豚摄影 - 样片选片系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#3B82F6' } } }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
      .hover-scale { transition: transform 0.3s ease; }
      .hover-scale:hover { transform: scale(1.03); }
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

<!-- 管理员登录弹窗 -->
<div id="admin-login" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80">
  <div class="bg-white w-full max-w-sm p-6 rounded-lg mx-4">
    <h3 class="text-lg font-bold mb-4 text-center">管理员登录</h3>
    <input id="admin-user" placeholder="账号" class="w-full p-2 border rounded mb-2">
    <input id="admin-pwd" type="password" placeholder="密码" class="w-full p-2 border rounded mb-3">
    <button onclick="adminLogin()" class="w-full bg-primary text-white p-2 rounded">登录</button>
    <button onclick="closeAdminLogin()" class="w-full mt-2 text-sm text-gray-500">关闭</button>
  </div>
</div>

<!-- 顶部导航 -->
<header class="fixed top-0 left-0 right-0 bg-white shadow z-40">
  <div class="px-4 py-3 flex justify-between items-center">
    <div class="font-bold text-lg">海豚摄影样片</div>
    <button onclick="openAdminLogin()" class="text-xs px-3 py-1 bg-gray-100 rounded">管理员</button>
  </div>
</header>

<!-- 主内容 -->
<main class="pt-20 pb-16 px-3 max-w-6xl mx-auto">
  <!-- 分类 -->
  <div class="flex flex-wrap gap-2 mb-4">
    <button onclick="filterAll()" class="px-3 py-1.5 rounded bg-primary text-white text-sm">全部</button>
    <button onclick="filterCat('children')" class="px-3 py-1.5 rounded bg-gray-200 text-sm">儿童摄影</button>
    <button onclick="filterCat('wedding')" class="px-3 py-1.5 rounded bg-gray-200 text-sm">婚纱摄影</button>
    <button onclick="filterCat('portrait')" class="px-3 py-1.5 rounded bg-gray-200 text-sm">个人写真</button>
    <button onclick="filterCat('birthday')" class="px-3 py-1.5 rounded bg-gray-200 text-sm">生日照</button>
    <button onclick="filterCat('graduation')" class="px-3 py-1.5 rounded bg-gray-200 text-sm">毕业照</button>
  </div>

  <!-- 照片网格 -->
  <div id="photo-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"></div>
</main>

<!-- 预览弹窗 + 分享 -->
<div id="preview-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/95">
  <div class="relative w-full max-w-lg p-2">
    <button onclick="closePreview()" class="absolute -top-10 right-0 text-white text-xl p-2">✕</button>
    <img id="preview-img" class="w-full rounded">
    <div class="flex justify-between mt-3">
      <button onclick="shareWeChat()" class="flex-1 mr-1 bg-green-500 text-white p-2 rounded flex items-center justify-center">
        <i class="fa fa-weixin mr-1"></i> 分享微信
      </button>
      <button onclick="closePreview()" class="flex-1 ml-1 bg-gray-600 text-white p-2 rounded">关闭</button>
    </div>
  </div>
</div>

<!-- 管理员上传面板 -->
<div id="admin-panel" class="fixed bottom-0 left-0 right-0 bg-white shadow z-40 hidden">
  <div class="p-3">
    <div class="flex justify-between items-center mb-2">
      <div class="font-semibold">管理员上传</div>
      <button onclick="logoutAdmin()" class="text-xs px-2 py-1 bg-red-500 text-white rounded">退出</button>
    </div>
    <input id="up-title" placeholder="标题" class="w-full p-2 border rounded mb-2">
    <select id="up-cate" class="w-full p-2 border rounded mb-2">
      <option value="children">儿童摄影</option>
      <option value="wedding">婚纱摄影</option>
      <option value="portrait">个人写真</option>
      <option value="birthday">生日照</option>
      <option value="graduation">毕业照</option>
    </select>
    <input type="file" id="up-file" accept="image/*" class="w-full mb-2">
    <button onclick="uploadPhoto()" class="w-full bg-primary text-white p-2 rounded">上传样片</button>
  </div>
</div>

<script>
// 存储
const PHOTO_KEY = "dolphin_photos";
const ADMIN_KEY = "admin_logined";

// 管理员账号
const ADMIN_USER = "admin";
const ADMIN_PWD = "admin888";

// 当前分类
let currentCat = "all";
let currentShareUrl = "";

// 初始化
window.onload = function () {
  loadPhotos();
  checkAdminLogin();
};

// 管理员登录
function openAdminLogin() { document.getElementById("admin-login").classList.remove("hidden"); }
function closeAdminLogin() { document.getElementById("admin-login").classList.add("hidden"); }
function adminLogin() {
  let u = document.getElementById("admin-user").value;
  let p = document.getElementById("admin-pwd").value;
  if (u === ADMIN_USER && p === ADMIN_PWD) {
    localStorage.setItem(ADMIN_KEY, "true");
    location.reload();
  } else {
    alert("账号或密码错误");
  }
}
function logoutAdmin() {
  localStorage.removeItem(ADMIN_KEY);
  location.reload();
}
function checkAdminLogin() {
  let logined = localStorage.getItem(ADMIN_KEY);
  if (logined) {
    document.getElementById("admin-panel").classList.remove("hidden");
  }
}

// 加载照片
function loadPhotos() {
  let list = JSON.parse(localStorage.getItem(PHOTO_KEY) || "[]");
  if (currentCat !== "all") {
    list = list.filter(item => item.cate === currentCat);
  }
  let dom = document.getElementById("photo-list");
  dom.innerHTML = "";

  if (list.length === 0) {
    dom.innerHTML = '<div class="col-span-full text-center py-10 text-gray-500">暂无样片</div>';
    return;
  }

  list.forEach((item, index) => {
    let card = document.createElement("div");
    card.className = "bg-white rounded shadow overflow-hidden hover-scale";
    card.onclick = () => openPreview(item.url);
    card.innerHTML = `
      <img src="${item.url}" class="w-full h-40 object-cover">
      <div class="p-2 text-sm truncate">${item.title}</div>
    `;
    dom.appendChild(card);
  });
}

// 上传照片（管理员）
function uploadPhoto() {
  let title = document.getElementById("up-title").value;
  let cate = document.getElementById("up-cate").value;
  let file = document.getElementById("up-file").files[0];
  if (!title || !file) {
    alert("请填写标题并选择图片");
    return;
  }
  let reader = new FileReader();
  reader.onload = function (e) {
    let list = JSON.parse(localStorage.getItem(PHOTO_KEY) || "[]");
    list.unshift({
      title: title,
      cate: cate,
      url: e.target.result,
      time: new Date().toLocaleString()
    });
    localStorage.setItem(PHOTO_KEY, JSON.stringify(list));
    alert("上传成功！");
    loadPhotos();
    document.getElementById("up-title").value = "";
    document.getElementById("up-file").value = "";
  };
  reader.readAsDataURL(file);
}

// 预览
function openPreview(url) {
  currentShareUrl = url;
  document.getElementById("preview-img").src = url;
  document.getElementById("preview-modal").classList.remove("hidden");
}
function closePreview() {
  document.getElementById("preview-modal").classList.add("hidden");
}

// 分享微信
function shareWeChat() {
  alert("请点击右上角 · 分享到微信好友/朋友圈");
}

// 筛选
function filterAll() {
  currentCat = "all";
  loadPhotos();
}
function filterCat(cate) {
  currentCat = cate;
  loadPhotos();
}
</script>
</body>
</html>
